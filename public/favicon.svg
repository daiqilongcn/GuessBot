<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="32" height="16" rx="8" fill="url(#shine)"/>

  <!-- Robot antenna -->
  <line x1="16" y1="4" x2="16" y2="7" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="16" cy="3.5" r="1.5" fill="white" opacity="0.9"/>

  <!-- Robot head body -->
  <rect x="7" y="7" width="18" height="14" rx="4" fill="white" opacity="0.22"/>
  <rect x="7" y="7" width="18" height="14" rx="4" fill="none" stroke="white" stroke-width="1.2" opacity="0.7"/>

  <!-- Eyes -->
  <circle cx="12" cy="13" r="2" fill="white" opacity="0.9"/>
  <circle cx="20" cy="13" r="2" fill="white" opacity="0.9"/>
  <!-- Eye shine -->
  <circle cx="12.7" cy="12.3" r="0.6" fill="white"/>
  <circle cx="20.7" cy="12.3" r="0.6" fill="white"/>

  <!-- Question mark mouth instead of normal mouth -->
  <text x="16" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="5.5" font-weight="900" fill="white" opacity="0.95">?</text>

  <!-- Robot neck -->
  <rect x="13" y="21" width="6" height="2" rx="1" fill="white" opacity="0.5"/>
</svg>
